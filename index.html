<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Keypad Web</title>
<link rel="manifest" href="./manifest.json">
<style>
body{font-family:sans-serif;background:#0f1115;color:#eee;margin:0;padding:20px}
.card{background:#171a21;padding:15px;border-radius:10px;margin-bottom:15px}
input,textarea{width:100%;padding:10px;margin-top:5px;background:#0c0e13;color:#fff;border:1px solid #333;border-radius:6px}
button{padding:10px 15px;margin-top:10px;border:none;border-radius:6px;background:#2f81f7;color:#fff;cursor:pointer}
.list{max-height:300px;overflow:auto;margin-top:10px}
.item{border-bottom:1px solid #333;padding:5px 0}
</style>
</head>
<body>

<h2>Keypad Web</h2>

<div class="card">
Keyer ID (6 หลัก)<br>
<input id="keyerId"/>
<button onclick="setKeyer()">ตั้งค่า</button>
<div id="keyerInfo"></div>
</div>

<div class="card">
เลข 2 ตัว<br>
<input id="twoNum" placeholder="07">
<input id="twoTop" placeholder="บน">
<input id="twoBottom" placeholder="ล่าง">
<button onclick="add2()">เพิ่ม</button>
</div>

<div class="card">
Paste หลายรายการ
<textarea id="paste"></textarea>
<button onclick="pasteAdd()">เพิ่มจาก Paste</button>
</div>

<div class="card">
รายการล่าสุด
<div id="list" class="list"></div>
<button onclick="clearAll()">ล้าง</button>
<button onclick="exportZip()">Export ZIP</button>
</div>

<script src="app.js"></script>
</body>
</html>
